<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my books</title>
    <style>
        body {
            font-family: 'Hiragino Mincho Pro', 'MS Mincho', serif;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }

        #janCode {
            width: 200px;
            padding: 8px;
            margin-bottom: 20px;
            border-radius: 4px;
            border: none;
        }

        #bookList {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: flex-end;
            min-height: 300px;
        }

        .bookItem {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            padding: 6px;
            border-radius: 3px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: white;
            text-decoration: none;
            cursor: pointer;
            margin-bottom: 20px;
            position: relative;
        }

        .bookItem h3 {
            margin: 0;
            font-size: 16px;
            word-break: break-all;
        }

        input {
            outline: none;
        }

        #tokenModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #tokenForm {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 300px;
        }

        #tokenForm input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
        }

        #tokenForm button {
            padding: 8px 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <input type="text" id="janCode" autocomplete="off" placeholder="JANコードを入力">
    <div id="bookList"></div>

    <!-- トークン入力モーダル -->
    <div id="tokenModal">
        <div id="tokenForm">
            <h3>GitHub Personal Access Token</h3>
            <p>書籍データをGitHubに保存するために、Personal Access Tokenを入力してください。</p>
            <input type="password" id="githubToken" placeholder="Tokenを入力">
            <button onclick="saveToken()">保存</button>
        </div>
    </div>

    <script>
        // テキストを読み上げる関数
        function speakText(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                speechSynthesis.speak(utterance);
            }
        }

        // ISBN-10をISBN-13に変換する関数（APIリクエスト用）
        function convertISBN10toISBN13(isbn10) {
            if (isbn10.length !== 10) return isbn10;

            const prefix = '978';
            const isbn12 = prefix + isbn10.substring(0, 9);
            let sum = 0;

            for (let i = 0; i < isbn12.length; i++) {
                const digit = parseInt(isbn12[i], 10);
                sum += (i % 2 === 0) ? digit : digit * 3;
            }

            const checkDigit = (10 - (sum % 10)) % 10;
            return isbn12 + checkDigit;
        }

        // ランダムな色を生成
        function getRandomColor() {
            const letters = '0123456789ABCDEF';
            let color = '#';
            for (let i = 0; i < 6; i++) {
                color += letters[Math.floor(Math.random() * 16)];
            }
            return color;
        }

        // ランダムな高さを生成
        function getRandomHeight() {
            return Math.floor(Math.random() * 100) + 150;
        }

        // タイトルの長さに応じて幅を計算
        function calculateWidth(title) {
            const baseWidth = 22;
            const additionalWidth = Math.min(title.length * 2, 100);
            return baseWidth + additionalWidth;
        }

        // 配列をシャッフルする関数
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // GitHub APIを使用してTSVファイルを更新
        async function updateTSVOnGitHub(title, url) {
            const token = localStorage.getItem('githubToken');
            if (!token) {
                showTokenModal();
                return;
            }

            const username = 'gojiroma';
            const repo = 'books';
            const path = 'books.tsv';
            const apiUrl = `https://api.github.com/repos/${username}/${repo}/contents/${path}`;

            try {
                // ファイルの現在のSHAを取得
                const response = await fetch(apiUrl, {
                    headers: {
                        'Authorization': `token ${token}`
                    }
                });

                const fileData = await response.json();
                const currentContent = atob(fileData.content);
                const newEntry = `${title}\t${url}\n`;

                // 新しいエントリを追加
                const updatedContent = currentContent + newEntry;
                const encodedContent = btoa(updatedContent);

                // ファイルを更新
                await fetch(apiUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Add book: ${title}`,
                        content: encodedContent,
                        sha: fileData.sha
                    })
                });
            } catch (error) {
                console.error('GitHub APIエラー:', error);
                speakText('GitHubへの保存中にエラーが発生しました。');
            }
        }

        // トークン入力モーダルを表示
        function showTokenModal() {
            document.getElementById('tokenModal').style.display = 'flex';
        }

        // トークンを保存
        function saveToken() {
            const token = document.getElementById('githubToken').value;
            if (token) {
                localStorage.setItem('githubToken', token);
                document.getElementById('tokenModal').style.display = 'none';
            }
        }

        // 入力が落ち着いたら自動で書籍情報を取得
        let debounceTimer;
        document.getElementById('janCode').addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(fetchBookInfo, 1000);
        });

        // ページ読み込み時にTSVから書籍情報を復元
        document.addEventListener('DOMContentLoaded', async () => {
            const tsvBooks = await fetchAndParseTSVBooks();
            shuffleAndDisplayBooks(tsvBooks);
            setInterval(() => shuffleAndDisplayBooks(tsvBooks), 180000); // 3分ごとにシャッフル
        });

        // TSVファイルをfetchしてパースして書籍情報を取得
        async function fetchAndParseTSVBooks() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/gojiroma/books/main/books.tsv');
                const tsvData = await response.text();
                const books = [];
                const lines = tsvData.split('\n');
                lines.forEach(line => {
                    if (line.trim() === '') return;
                    const [title, url] = line.split('\t');
                    const asin = url.split('asin=')[1];
                    books.push({
                        summary: { title },
                        inputCode: asin,
                        url
                    });
                });
                return books;
            } catch (error) {
                console.error('TSVファイルの読み込み中にエラーが発生しました:', error);
                return [];
            }
        }

        // 書籍情報をシャッフルして表示
        function shuffleAndDisplayBooks(books) {
            const bookList = document.getElementById('bookList');
            bookList.innerHTML = '';
            const shuffledBooks = shuffleArray(books);
            shuffledBooks.forEach(book => displayBookInfo(book, false));
        }

        async function fetchBookInfo() {
            const inputCode = document.getElementById('janCode').value.trim();
            if (!inputCode) return;

            // APIリクエスト用にISBN-10をISBN-13に変換
            const isbnForApi = inputCode.length === 10 ? convertISBN10toISBN13(inputCode) : inputCode;

            // OpenBD APIを使用
            const apiUrl = `https://api.openbd.jp/v1/get?isbn=${isbnForApi}&pretty`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data && data.length > 0) {
                    const bookData = data[0];
                    bookData.inputCode = inputCode;

                    displayBookInfo(bookData, true);
                    await updateTSVOnGitHub(bookData.summary.title, bookData.url || `https://www.amazon.co.jp/dp/${bookData.inputCode}`);
                } else {
                    speakText('書籍情報が見つかりませんでした。');
                }
            } catch (error) {
                console.error('エラー:', error);
                speakText('書籍情報の取得中にエラーが発生しました。');
            }

            // 入力フィールドをクリア
            document.getElementById('janCode').value = '';
        }

        function displayBookInfo(bookData, shouldSpeak = false) {
            const bookList = document.getElementById('bookList');
            const bookItem = document.createElement('a');
            bookItem.className = 'bookItem';

            // タイトル
            const title = bookData.summary.title || 'タイトル不明';
            // Amazonリンク
            const amazonUrl = bookData.url || `https://www.amazon.co.jp/dp/${bookData.inputCode}`;

            bookItem.href = amazonUrl;
            bookItem.target = '_blank';
            bookItem.style.backgroundColor = getRandomColor();
            bookItem.style.height = `${getRandomHeight()}px`;
            bookItem.style.width = `${calculateWidth(title)}px`;

            bookItem.innerHTML = `
                <h3>${title}</h3>
            `;

            // ミドルクリックで削除
            bookItem.addEventListener('auxclick', (e) => {
                if (e.button === 1) { // ミドルクリック
                    e.preventDefault();
                    bookItem.remove();
                }
            });

            bookList.appendChild(bookItem);

            // タイトルを読み上げる
            if (shouldSpeak) {
                speakText(title);
            }
        }

        document.getElementsByTagName('input')[0].focus();
    </script>
</body>

</html>
